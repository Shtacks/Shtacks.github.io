<footer class="site-footer">
  <div class="wrapper footer-shell">
    <div>
      <p class="footer-copy">{{ site.title | escape }}</p>
      <p class="footer-description">{{ site.description | escape }}</p>
    </div>
    <div class="footer-contact">
      <p class="footer-contact-label">Contact</p>
      {% if site.email %}
      <a class="footer-contact-link contact-link" href="mailto:{{ site.email }}">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm0 2v.2l9 6.3 9-6.3V7l-9 6-9-6z"/></svg>
        </span>
        <span>{{ site.email }}</span>
      </a>
      {% endif %}
      {% if site.github_username %}
      <a class="footer-contact-link contact-link" href="https://github.com/{{ site.github_username }}">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.42-4.04-1.42-.55-1.38-1.34-1.75-1.34-1.75-1.1-.74.08-.73.08-.73 1.21.09 1.85 1.24 1.85 1.24 1.08 1.84 2.83 1.31 3.52 1 .11-.78.42-1.31.77-1.61-2.67-.31-5.48-1.34-5.48-5.95 0-1.31.47-2.37 1.24-3.2-.12-.31-.54-1.56.12-3.25 0 0 1.01-.32 3.3 1.22a11.4 11.4 0 0 1 6 0c2.28-1.54 3.29-1.22 3.29-1.22.67 1.69.25 2.94.13 3.25.77.83 1.23 1.89 1.23 3.2 0 4.62-2.81 5.63-5.49 5.94.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5z"/></svg>
        </span>
        <span>github.com/{{ site.github_username }}</span>
      </a>
      {% endif %}
      {% if site.linkedin_url %}
      <a class="footer-contact-link contact-link" href="{{ site.linkedin_url }}">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M6.94 8.5A1.56 1.56 0 1 1 6.9 5.38a1.56 1.56 0 0 1 .04 3.12zM5.5 9.75h2.8V18H5.5V9.75zm4.55 0h2.69v1.13h.04c.37-.71 1.29-1.46 2.65-1.46 2.83 0 3.36 1.86 3.36 4.28V18H16v-3.8c0-.91-.02-2.08-1.27-2.08-1.27 0-1.47.99-1.47 2.01V18h-2.8V9.75z"/></svg>
        </span>
        <span>LinkedIn profile</span>
      </a>
      {% endif %}
    </div>
  </div>
</footer>
