---
layout: default
---

<article class="surface reading-surface">
  {% if page.title and page.url != '/about/' and page.url != '/posts/' and page.url != '/404.html' %}
  <header class="page-header">
    <span class="eyebrow">Page</span>
    <h1 class="page-title">{{ page.title | escape }}</h1>
    {% if page.description %}
    <p class="page-intro">{{ page.description }}</p>
    {% endif %}
  </header>
  {% endif %}
  <div class="page-body">
    {{ content }}
  </div>
</article>
